<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="crat.css">
    <title>Document</title>
</head>
<body>
<style>
body{
 font-family:Arial;
 padding:30px;
 background:#f5f5f5;
 scroll-behavior: inherit;
  
}

.cart-item{
 background:white;
 padding:15px;
 margin-bottom:10px;
 border-radius:10px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

button{
 background:red;
 color:white;
 border:none;
 padding:8px 12px;
 border-radius:5px;
 cursor:pointer;
}

.total{
 margin-top:20px;
 font-size:24px;
 font-weight:bold;
}
</style>


<body>

<h1 id="contactme">🛒 Shopping Cart</h1>

<div id="cart"></div>

<div class="checkout-box">
 Total: dh<span id="total">0</span>
</div> 
<div class="checkout-box" id="contactme">

  <h3>Checkout 🛒</h3>

  <input id="name" type="text" placeholder="Your Name">
  <input id="phone" type="text" placeholder="Phone Number">
  <input id="address" type="text" placeholder="Address">
 


  <button onclick="sendOrder()">
    Confirm Order
  </button>

</div>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){

 let total = 0;

 document.getElementById("cart").innerHTML =
 cart.map((item,index)=>{

 total += item.price;

 return `
 <div class="cart-item">

   <div>
    <h3>${item.name}</h3>
    <p>${item.price} DH</p>
   </div>

   <button onclick="removeItem(${index})">
   Delete
   </button>

 </div>
 `;
 }).join("");

 document.getElementById("total").innerText =
 total + " DH";
}

function removeItem(index){

 cart.splice(index,1);

 localStorage.setItem(
 "cart",
 JSON.stringify(cart)
 );

 renderCart();
}

renderCart(); 

function sendOrder(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let message = "🛒 NEW ORDER\n\n";

  message += "Name: " + name + "\n";
  message += "Phone: " + phone + "\n";
  message += "Address: " + address + "\n";

  message += "Products:\n";

  let total = 0;

  cart.forEach(item => {

    message += "- " + item.name;

    if(item.customName){
      message += " | Name: " + item.customName;
    }

    message += " ($" + item.price + ")\n";

    total += item.price;
  });

  message += "\nTotal: $" + total;

  let whatsappNumber = "212773300654";

  let url =
  "https://wa.me/" +
  whatsappNumber +
  "?text=" +
  encodeURIComponent(message);

  window.open(url, "_blank");
}





</script>

</body>
</html>
